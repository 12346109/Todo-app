<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="description" content="Update your Todo App password securely using an OTP sent to your email.">
    <script src="pg3.js" defer></script>

        <p id="otp2"></p>
    </form>
</body>
</html>
